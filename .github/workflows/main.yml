name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Install pods
        run: |
          cd ios
          pod install

      - name: Build
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
          -scheme mobile_app \
          -configuration Release \
          -sdk iphoneos \
          build

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: ios/build
